name: Pulse — lead accountability sweep

# Drives the Pulse engine (api/pulse.js) on a near-real-time cadence. Vercel's
# built-in cron caps at once/day on this plan, so we trigger the public endpoint
# from GitHub Actions instead (free + unlimited on a public repo). Pulse is
# idempotent, so running it often is safe — it never double-tasks a contact.

on:
  schedule:
    # Requested every 5 min — GitHub throttles scheduled runs on quiet public
    # repos (observed: */15 fired only every 1.5-3.5h), so ask more often to get
    # an effective ~15-30 min cadence. Pulse is idempotent; extra runs are free.
    - cron: "*/5 * * * *"
  workflow_dispatch:          # allow manual runs from the Actions tab

jobs:
  pulse:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Pulse sweep
        run: |
          echo "Pulse sweep at $(date -u)"
          code=$(curl -s -o /tmp/pulse.json -w "%{http_code}" --max-time 90 \
            "https://landportal-coral.vercel.app/api/pulse")
          echo "HTTP $code"
          cat /tmp/pulse.json || true
          echo
          test "$code" = "200"
